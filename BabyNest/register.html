<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | BabyNest</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #fff5f7;
        }
        
        .register-box {
            width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
        }
        
        .register-box h2 {
            text-align: center;
            color: #ff6b81;
            margin-bottom: 25px;
        }
        
        .register-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        
        .register-box input:focus {
            border-color: #ff6b81;
        }
        
        .register-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b81;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 17px;
            transition: .3s;
        }
        
        .register-box button:hover {
            background: #ff4f6f;
        }
        
        .register-box p {
            text-align: center;
            margin-top: 18px;
        }
        
        .register-box a {
            color: #ff6b81;
            text-decoration: none;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <div class="register-box">

        <h2>Create Account</h2>

        <form>

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">

                Register

            </button>

        </form>

        <p>

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</body>

</html>
